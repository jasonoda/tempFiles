<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@400;500;600;700&family=Nunito:wght@400;600;700&family=Aleo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
</head>
<body data-game="cross">
    <!-- Start Menu -->
    <div id="startMenu">
        <div id="startMenuContainer">
            <img src="../../src/img/cross.svg" alt="Cross" style="height: 40px; width: auto; margin-bottom: 10px;">
            <div id="crossTitle">CROSS</div>
            <div id="instructionsStartDiv">
                <div class="instructionLine">find the two hidden words</div>
                <div class="instructionDivider"></div>
                <div class="instructionLine">use the arrow buttons to rotate<br>the outer and inner rings</div>
                <div class="instructionDivider"></div>
                <div class="instructionLine">select letters to form words<br>horizontally or vertically<br>in any direction</div>
                <div class="instructionImageContainer">
                    <img src="instructions.svg" alt="Word directions" class="instructionImage">
                </div>
                <!-- <div class="instructionDivider"></div> -->
                <!-- <div class="instructionLine">find both words to win</div> -->
            </div>
            <div id="playButton" data-game="cross">PLAY</div>
        </div>
    </div>
    
    <button id="helpButton"></button>
    <div class="container" id="gameContainer" style="display: none;">
        <div class="instruction-text" id="instructionText"></div>
        <div class="grid-wrapper">
            <div class="grid-container" id="referenceGrid"></div>
            <div class="cells-container" id="cellsContainer"></div>
        </div>
        <div class="controls">
            <div class="button-group-container">
                <img src="outerRing.svg" alt="OUTER" class="button-label">
                <div class="button-group">
                    <button class="arrow-button" id="numberLeft">←</button>
                    <button class="arrow-button" id="numberRight">→</button>
                </div>
            </div>
            <div class="button-group-container">
                <img src="innerRing.svg" alt="INNER" class="button-label">
                <div class="button-group">
                    <button class="arrow-button" id="letterLeft">←</button>
                    <button class="arrow-button" id="letterRight">→</button>
                </div>
            </div>
        </div>
        <button class="hint-button" id="hintButton">HINT -<span class="star">★</span>1</button>
        <div class="hint-answers" id="hintAnswers" style="display: none;"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../../gameVars.js"></script>
    <script src="script.js"></script>
</body>
</html>
